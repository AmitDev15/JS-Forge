<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Forge — Learn JavaScript</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="topbar"></div>
    <div id="toast"></div>
    <div class="modal-wrap" id="introModal" aria-hidden="true">
      <div class="modal" id="introBox"></div>
    </div>

    <nav class="nav">
      <button class="menu-btn icon-btn" id="menuBtn" aria-label="Menu">
        ☰
      </button>
      <div class="brand" onclick="go('home')">
        <span class="mk">JS</span>Forge
      </div>
      <div class="search">
        <span class="mag">⌕</span>
        <input
          id="search"
          type="text"
          placeholder="Search lessons, concepts, questions…"
          autocomplete="off"
        />
        <div class="search-res" id="searchRes"></div>
      </div>
      <div class="nav-right">
        <span class="xp">⚡ <b id="xpNav">0</b> XP</span>
        <span class="ring">
          <img
            class="user-icon"
            src="assets/user-icon.webp"
            alt="User Icon"
            height="14"
          />
          <span id="ringPct">0%</span>
        </span>
        <button
          class="icon-btn"
          onclick="openIntro()"
          aria-label="About & rules"
          title="About & rules"
        >
          ⓘ
        </button>
        <button class="icon-btn" id="themeBtn" aria-label="Theme">☾</button>
      </div>
    </nav>

    <div class="backdrop" id="backdrop"></div>

    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="side-label">Start</div>
        <div class="side-item" data-nav="home" onclick="go('home')">Home</div>
        <div class="side-label">Lessons</div>
        <div id="lessonNav"></div>
        <div class="side-label">Tools</div>
        <div class="side-item" data-nav="tracer" onclick="go('tracer')">
          Execution Tracer
        </div>
        <div class="side-item" data-nav="challenges" onclick="go('challenges')">
          Code Challenges
        </div>
        <div class="side-item" data-nav="flashcards" onclick="go('flashcards')">
          Flashcards
        </div>
        <div class="side-item" data-nav="revision" onclick="go('revision')">
          Quick Revision
        </div>
        <div
          class="side-item"
          data-nav="achievements"
          onclick="go('achievements')"
        >
          Achievements
        </div>
        <div class="side-item" data-nav="stats" onclick="go('stats')">
          My Stats
        </div>
        <div class="side-item" data-nav="notes" onclick="go('notes')">
          My Notes
        </div>
      </aside>

      <main class="main">
        <section id="view-home" class="view"></section>
        <section id="view-lesson" class="view"></section>
        <section id="view-tracer" class="view"></section>
        <section id="view-challenges" class="view"></section>
        <section id="view-flashcards" class="view"></section>
        <section id="view-revision" class="view"></section>
        <section id="view-achievements" class="view"></section>
        <section id="view-stats" class="view"></section>
        <section id="view-notes" class="view"></section>
      </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
